version: '3.8'

services:
  multi-agent-system:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintech-multi-agent
    ports:
      - "8000:8000"
      - "8001:8001"
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MODEL_NAME=claude-sonnet-4-6
      - MCP_TRANSPORT=sse
      - MCP_PORT=8001
      - API_PORT=8000
      - DOCUMENTS_DIR=/app/data/documents
      - VECTOR_STORE_PATH=/app/data/vector_store
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
